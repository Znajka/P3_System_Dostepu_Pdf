spring:
  application:
    name: p3-dostepu-backend
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL13Dialect
        format_sql: true
        use_sql_comments: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/p3_system_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=1h

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${APP_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    failed-attempts: ${APP_RATE_LIMIT_FAILED_ATTEMPTS:5}
    window-minutes: ${APP_RATE_LIMIT_WINDOW_MINUTES:15}
    lockout-minutes: ${APP_RATE_LIMIT_LOCKOUT_MINUTES:30}
  document:
    ticket-ttl-seconds: ${APP_DOCUMENT_TICKET_TTL_SECONDS:60}
  # Scheduled tasks configuration
  scheduled:
    grant-expiration-enabled: ${GRANT_EXPIRATION_ENABLED:true}
    grant-expiration-interval-seconds: ${GRANT_EXPIRATION_INTERVAL_SECONDS:300}
    grant-expiration-initial-delay-seconds: ${GRANT_EXPIRATION_INITIAL_DELAY_SECONDS:60}
    expiration-notification-enabled: ${EXPIRATION_NOTIFICATION_ENABLED:false}
    expiration-notification-hours-before: ${EXPIRATION_NOTIFICATION_HOURS_BEFORE:24}
  security:
    ip-pinning-enabled: ${APP_SECURITY_IP_PINNING_ENABLED:true}

logging:
  level:
    root: INFO
    com.p3.dostepu: ${APP_LOGGING_LEVEL:INFO}
    org.springframework.security: DEBUG
    org.springframework.scheduling: DEBUG