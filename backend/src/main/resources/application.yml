spring:
  application:
    name: p3-dostepu-backend
  servlet:
    multipart:
      enabled: true
      max-file-size: 104857600
      max-request-size: 115343360
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/p3_system_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=1h

server:
  max-http-request-header-size: 65536

app:
  jwt:
    # Must match FastAPI APP_JWT_SECRET (see docker-compose). Empty default breaks local mixed runs.
    secret: "${APP_JWT_SECRET:dev-jwt-secret-min-32-chars-for-hs256-demo!!}"
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${APP_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    failed-attempts: ${APP_RATE_LIMIT_FAILED_ATTEMPTS:5}
    window-minutes: ${APP_RATE_LIMIT_WINDOW_MINUTES:15}
    lockout-minutes: ${APP_RATE_LIMIT_LOCKOUT_MINUTES:30}
  document:
    ticket-ttl-seconds: ${APP_DOCUMENT_TICKET_TTL_SECONDS:60}
  # Scheduled tasks configuration
  scheduled:
    grant-expiration-enabled: ${GRANT_EXPIRATION_ENABLED:true}
    grant-expiration-interval-seconds: ${GRANT_EXPIRATION_INTERVAL_SECONDS:300}
    grant-expiration-initial-delay-seconds: ${GRANT_EXPIRATION_INITIAL_DELAY_SECONDS:60}
    expiration-notification-enabled: ${EXPIRATION_NOTIFICATION_ENABLED:false}
    expiration-notification-hours-before: ${EXPIRATION_NOTIFICATION_HOURS_BEFORE:24}
  security:
    # Prefer explicit true in prod; pinning breaks easily across ports (::1 vs 127.0.0.1, Docker gateways).
    ip-pinning-enabled: ${APP_SECURITY_IP_PINNING_ENABLED:false}
  internal:
    # Must match FastAPI APP_INTERNAL_API_KEY (docker-compose default: dev-p3-internal-api-key).
    api-key: ${APP_INTERNAL_API_KEY:dev-p3-internal-api-key}

fastapi:
  service:
    # Plain HTTP unless you terminate TLS elsewhere (internal docker network uses HTTP).
    url: ${FASTAPI_SERVICE_URL:http://localhost:8443}

logging:
  level:
    root: INFO
    com.p3.dostepu: ${APP_LOGGING_LEVEL:INFO}
    org.springframework.security: DEBUG
    org.springframework.scheduling: DEBUG